<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiran Launchpad | From Ideas to Digital Success</title>
    <meta name="description" content="Thiran Launchpad - Premium Digital Agency in Tamil Nadu. We transform student developers into full-service digital partners for local businesses and startups." />
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #050505;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        background: #FF1E1E;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 40px;
        color: white;
        box-shadow: 0 0 30px rgba(255, 30, 30, 0.4);
        margin-bottom: 20px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      .loader-bar {
        width: 200px;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }
      .loader-progress {
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #FF1E1E;
        animation: loading 2s infinite linear;
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-logo">T</div>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 500);
        }, 1000);
      });
    </script>
  </body>
</html>
